<!doctype html>
<html>
  <head>
    <title>Get to know Bootstrap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div>
      <div>
        <nav class="navbar bg-primary">
          <div class="container-fluid">
            <a class="navbar-brand text-white" href="#"
              ><i class="bi bi-cart3"></i> Product Store</a
            >
            <button
              class="btn btn-light position-relative"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarSupportedContent"
              aria-controls="navbarSupportedContent"
              aria-expanded="false"
              aria-label="Toggle navigation"
              onclick="displayCart()"
            >
              <i
                class="bi bi-cart3"
                data-bs-toggle="offcanvas"
                href="#offcanvasExample"
                role="button"
                aria-controls="offcanvasExample"
              ></i>
              cart
              <span
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger card-badge"
                >0</span
              >
            </button>

            <div
              class="offcanvas offcanvas-end"
              tabindex="-1"
              id="offcanvasExample"
              aria-labelledby="offcanvasExampleLabel"
            >
              <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="offcanvasExampleLabel">
                  Shopping Cart
                </h5>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="offcanvas"
                  aria-label="Close"
                ></button>
              </div>
              <div class="offcanvas-body">
                <div
                  class="border-bottom d-flex justify-content-center"
                  id="cartItems"
                >
                  <div class="my-3">Your cart is empty</div>
                </div>
                <div class="mt-3 d-flex justify-content-between">
                  <div>
                    <strong>Total:</strong>
                    <p class="chosen-product-name" id="cartTotal">$.00</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </nav>
      </div>
      <div class="container my-5">
        <h1 class="text-center mb-4 mt-5">Our Products</h1>
        <div class="gallery row g-4"></div>
        <div
          class="modal fade"
          id="exampleModal"
          tabindex="-1"
          aria-labelledby="exampleModalLabel"
          aria-hidden="true"
        >
          <div class="modal-dialog modal-lg">
            <div class="modal-content">
              <div class="modal-header">
                <h1 class="modal-name fs-5" id="exampleModalLabel">title</h1>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Close"
                ></button>
              </div>
              <div class="modal-body">
                <div class="row">
                  <div class="col-md-5">
                    <img src="" class="modal-img img-fluid rounded" alt="..." />
                  </div>
                  <div class="col-md-7">
                    <p class="modal-description">
                      <span class="bold">Description:</span>
                    </p>
                    <p class="modal-price"><span>Price:</span></p>
                    <p class="modal-category"><span>Category:</span></p>
                    <p class="modal-stock"><span>Available Stock:</span></p>
                    <div
                      class="btn-group"
                      role="group"
                      aria-label="Basic example"
                    >
                      <button
                        type="button"
                        class="btn border"
                        onclick="decreaseQuantity()"
                      >
                        -
                      </button>
                      <input class="text-center chosen-quantity" value="1" />
                      <button
                        type="button"
                        class="btn border"
                        onclick="increaseQuantity()"
                      >
                        +
                      </button>
                    </div>
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <button
                  type="button"
                  class="btn btn-secondary"
                  data-bs-dismiss="modal"
                >
                  Close
                </button>
                <button
                  type="button"
                  class="btn btn-primary"
                  id="liveToastBtn"
                  data-bs-dismiss="modal"
                  s
                  onclick="addToCart()"
                >
                  <i class="bi bi-cart-plus"></i> Add to Cart
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="addToCartToast" class="toast" role="alert">
        <div class="toast-header bg-success text-white">
          <i class="bi bi-check-circle me-2"></i>
          <strong class="me-auto">Success</strong>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="toast"
          ></button>
        </div>
        <div class="toast-body" id="toastMessage"></div>
      </div>
    </div>
    <script>
      const products = [
        {
          id: 1,
          name: 'Laptop',
          description: 'High-performance laptop for work and gaming',
          price: 999.99,
          category: 'Electronics',
          stock: 5,
          image:
            'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400',
        },
        {
          id: 2,
          name: 'Smartphone',
          description: 'Latest model with amazing camera',
          price: 699.99,
          category: 'Electronics',
          stock: 0,
          image:
            'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400',
        },
        {
          id: 3,
          name: 'Headphones',
          description: 'Noise-cancelling wireless headphones',
          price: 199.99,
          category: 'Audio',
          stock: 15,
          image:
            'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400',
        },
        {
          id: 4,
          name: 'Keyboard',
          description: 'Mechanical gaming keyboard with RGB',
          price: 89.99,
          category: 'Accessories',
          stock: 8,
          image:
            'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400',
        },
        {
          id: 5,
          name: 'Mouse',
          description: 'Ergonomic wireless mouse',
          price: 49.99,
          category: 'Accessories',
          stock: 12,
          image:
            'https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=400',
        },
      ];

      let currentItem;
      let currentQuantity;

      //displaying modal content
      function displayModalContent(index) {
        currentItem = products[index];
        currentQuantity = 1;
        let modalName = document.q;
        document.querySelector('.modal-name').innerHTML = currentItem.name;
        document.querySelector('.modal-img').src = currentItem.image;
        document.querySelector('.modal-description').innerHTML =
          `<span class="fw-bold">Description: </span>` +
          currentItem.description;
        document.querySelector('.modal-price').innerHTML =
          `<span class="fw-bold">Price: </span>` + currentItem.price;
        document.querySelector('.modal-category').innerHTML =
          `<span class="fw-bold">Category: </span>` + currentItem.category;
        document.querySelector('.modal-stock').innerHTML =
          `<span class="fw-bold">Available Stock: </span>` + currentItem.stock;
      }

      //
      let content = '';

      for (i = 0; i < products.length; i++) {
        let currentItem = products[i];
        let buttonAtribute = '';
        let cardClass = '';
        let textColor = '';

        if (currentItem.stock <= 0) {
          buttonAtribute = 'disabled';
          cardClass = 'opacity-50';
          textColor = 'text-danger';
        } else if (currentItem.stock > 0) textColor = 'text-success';
        content =
          content +
          `
          <div class="col-md-4 col-sm-6 mb-4">
            <div class="card h-100 ${cardClass}" ">
              <img src="${currentItem.image}" class="card-img-top d-flex object-fit-cover" alt="..." style="height: 200px;">
               <div class="card-body">
                <h5 class="card-title">${currentItem.name}</h5>
                <p class="fs-6 card-text">${currentItem.category}</p>
                <p class="card-text">${currentItem.description}</p>
                <p class="card-text fw-bold text-primary">$${currentItem.price}</p>
                <p class="card-text ${textColor}">In stock: ${currentItem.stock}</p>
                <button ${buttonAtribute} class="btn btn-primary w-100" onClick="displayModalContent(${i})" data-bs-toggle="modal" data-bs-target="#exampleModal">Show Details</button>
               </div>
            </div>
           </div>
     `;
        //disable the button when the stock is <=0
        //add atribute disabled
        //<img src="" class="modal-img card-img-top d-flex object-fit-cover" alt="..." style="height: 200px;">
        //<div class="card-body"><h5 class="card-title"></h5> <p class="fs-6 card-text"></p> <p class="card-text"></p> <p class="card-text fw-bold text-primary"></p> <p class="card-text"></p> </div>
      }
      document.querySelector('.gallery').innerHTML = content;

      //increasing quantity
      function increaseQuantity() {
        if (currentQuantity < currentItem.stock) {
          currentQuantity++;
          document.querySelector('.chosen-quantity').value = currentQuantity;
        }
      }

      //decreasing quantity
      function decreaseQuantity() {
        if (currentQuantity <= currentItem.stock && currentQuantity > 1) {
          currentQuantity--;
          document.querySelector('.chosen-quantity').value = currentQuantity;
        }
      }

      // Cart Array
      let cart = [];

      // Add to cart
      function addToCart() {
        // Show toast
        let toastElement = document.querySelector('#addToCartToast');
        let toast = new bootstrap.Toast(toastElement);

        toast.show();

        // Update toast content
        let toastMessage = document.querySelector('#toastMessage');
        toastMessage.innerHTML = `${currentItem.name} (x${currentQuantity}) Item added to cart!`;

        //record information
        cart.push({
          item: currentItem,
          quantity: currentQuantity,
        });

        console.log('cart', cart);

        // update cart item badge
        let cardBadge = document.querySelector('.card-badge');
        let cartQuantity = 0;
        for (i = 0; i < cart.length; i++) {
          let currentCartItem = cart[i];

          cartQuantity = cartQuantity + currentCartItem.quantity;
        }
        cardBadge.innerHTML = cartQuantity;
      }

      function displayCart() {
        // cart array
        // loop through it to display the cart items similar to products list above
        let cartContent = '';
        let finalTotal = 0;
        for (let i = 0; i < cart.length; i++) {
          let currentCartItem = cart[i];
          let currentCartItemTotal =
            currentCartItem.item.price * currentCartItem.quantity;
          cartContent =
            cartContent +
            `
                    <div class="card mb-2">
                            <div class="card-body p-2">
                                <h6 class="mb-1">${currentCartItem.item.name}</h6>
                                <p class="mb-1 small text-muted">$${currentCartItem.item.price} x ${currentCartItem.quantity}</p>
                                <p class="mb-0"><strong>$${currentCartItemTotal}</strong></p>
                            </div>
                        </div>
                    `;

          finalTotal = finalTotal + currentCartItemTotal;
        }

        let cartItems = document.querySelector('#cartItems');
        cartItems.innerHTML = cartContent;

        let cartTotal = document.querySelector('#cartTotal');
        cartTotal.innerHTML = finalTotal;
      }
    </script>
  </body>
</html>
