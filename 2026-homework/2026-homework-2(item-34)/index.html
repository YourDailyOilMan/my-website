    <title>Get to know Bootstrap</title>

    <link

      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <style>
      .button-design {
        background-color: white;
        border: none;
        font-size: 20px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div></div>
    <div class="container">
      <h1 class="text-center"><i class="bi bi-images"></i> Image Gallery</h1>
      <div class="gallery row m-2"></div>
      <div
        class="modal fade"
        id="abc"
        tabindex="-1"
        aria-labelledby="exampleModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content border border-0">
            <div class="modal-header button-design">
              <h1 class="modal-title fs-5" id="exampleModalLabel">Title</h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body button-design">
              <img class="  modal-img" src="" />
              <div class="card-body">Description</div>
            </div>
            <div class="modal-footer button-design"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const images = [
        {
          title: 'Mountain Lake',
          url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600',
          description:
            'A carved mountain range set against the sunset detailin its structure and beauty',
        },
        {
          title: 'Forest Lake',
          url: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=600',
        },
        {
          title: 'Ocean Sunset',
          url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600',
        },
        {
          title: 'City Skyline',
          url: 'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=600',
        },
        {
          title: 'Desert Dunes',
          url: 'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=600',
        },
      ];

      function setModalContent(index) {
        let currentItem = images[index];
        // select each of the modal content and update it
        // for img put .src
        let modalTitle = document.q;
        document.querySelector('.modal-title').innerHTML = currentItem.title;
        document.querySelector('.modal-img').src = currentItem.url;
      }
      let content = '';

      for (i = 0; i < images.length; i++) {
        let currentItem = images[i];

        content =
          content +
          `<div class="col-md-4" onClick="setModalContent(${i})" data-bs-toggle="modal" data-bs-target="#abc">
          <div class="card m-2" >
            <img
              src="${currentItem.url}"
              class="card-img-top"
              alt="..."
            />
            <div class="card-body">
              ${currentItem.title}
              
            </div>
          </div>
    </div>`;
      }
      document.querySelector('.gallery').innerHTML = content;
    </script>
