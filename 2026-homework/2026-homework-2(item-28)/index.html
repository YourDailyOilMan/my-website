<!doctype html>
<html lang="en">
  <head>
    <title>HTML Template</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <style></style>
  </head>
  <body>
    <div class="container">
      <div
        class="card border border-secondary mx-auto p-2 mt-4 mb-5 shadow"
        style="width: 500px; height: 160px"
      >
        <div class="card-body">
          <h5 class="card-title fw-bold fs-3">List of Profiles</h5>
          <button
            type="button"
            class="btn btn-light"
            onclick="profileDisplay()"
          >
            Print profiles
          </button>
          <button
            type="button"
            class="btn btn-primary"
            data-bs-toggle="modal"
            data-bs-target="#exampleModal"
          >
            Show
          </button>
        </div>
      </div>

      <div class="profile-list row"></div>
    </div>
    <script>
      const profiles = [
        {
          fullName: 'Alice Johnson',
          gender: 'Female',
          occupation: 'Web Developer',
          avatar: {
            images: {
              large:
                'https://t3.ftcdn.net/jpg/05/98/48/88/360_F_598488869_fiLUgajDxyaoxE9D3SuHMZfD56IjrBXe.jpg',
            },
          },
        },
        {
          fullName: 'Bob Smith',
          gender: 'Male',
          occupation: 'Graphic Designer',
          avatar: {
            images: {
              large:
                'https://sm.ign.com/ign_nordic/cover/a/avatar-gen/avatar-generations_prsz.jpg',
            },
          },
        },
        {
          fullName: 'Carol White',
          gender: 'Female',
          occupation: 'Project Manager',
          avatar: {
            images: {
              large:
                'https://t3.ftcdn.net/jpg/05/98/48/88/360_F_598488869_fiLUgajDxyaoxE9D3SuHMZfD56IjrBXe.jpg',
            },
          },
        },
        {
          fullName: 'Dave Brown',
          gender: 'Male',
          occupation: 'Software Engineer',
          avatar: {
            images: {
              large:
                'https://sm.ign.com/ign_nordic/cover/a/avatar-gen/avatar-generations_prsz.jpg',
            },
          },
        },
      ];
      function profileDisplay() {
        let Profiles = document.querySelector('.profile-list');
        let iD = document.querySelector('exampleModal');
        let content = '';

        for (i = 0; i < profiles.length; i++) {
          let currentItem = profiles[i];

          content =
            content +
            `<div class="col-md-3">

                <div class="card mb-3" style="max-width: 540px;">
  <div class="row g-0">
    <div class="col-md-6">
      <img src="${currentItem.avatar.images.large}" class="img-fluid rounded-circle" alt="...">
    </div>
    <div class="col-md-6">
      <div class="card-body">
        <p class="card-text"><span class="fw-bold">Name</span> ${currentItem.fullName}</p>
        <p class="card-text"><span class="fw-bold">Gender</span> ${currentItem.gender}</p>
        <p class="card-text"><span class="fw-bold">Occupation</span> ${currentItem.occupation}</p>
        <!--Homework (28.02.26)-->
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">Show</button>
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Profile</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="card-text"><span class="fw-bold">Name</span> ${currentItem.fullName}</p>
        <p class="card-text"><span class="fw-bold">Gender</span> ${currentItem.gender}</p>
        <p class="card-text"><span class="fw-bold">Occupation</span> ${currentItem.occupation}</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
      </div>
    </div>
  </div>
</div>
            </div>`;
        }

        Profiles.innerHTML = content;
      }
    </script>
  </body>
  <!---->
</html>
