<!doctype html>
<html>
  <head>
    <title>Get to know Bootstrap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <style></style>
  </head>
  <body>
    <div class="container">
      <h1 class="text-center"><i class="bi bi-images"></i> Image Gallery</h1>
      <div class="gallery row m-2">
        <div class="col-md-4">
          <div class="card m-2">
            <img
              src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600"
              class="card-img-top img-fluid"
              alt=""
            />
            <div class="card-body">
              <h5 class="card-title">Mountain Lake</h5>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let images = [
        {
          title: 'Mountain Lake',
          url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600',
        },
        {
          title: 'Forest Path',
          url: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=600',
        },
        {
          title: 'Ocean Sunset',
          url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600',
        },
        {
          title: 'City Skyline',
          url: 'https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=600',
        },
        {
          title: 'Desert Dunes',
          url: 'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=600',
        },
      ];

      let gallery = document.querySelector('.gallery');
      let galleryContent = '';

      for (let i = 0; i < images.length; i++) {
        let currentItem = images[i];

        galleryContent =
          galleryContent +
          `
            <div class="col-md-4">
          <div class="card m-2">
            <img
              src="${currentItem.url}"
              class="card-img-top img-fluid"
              alt=""
            />
            <div class="card-body">
              <h5 class="card-title">${currentItem.title}</h5>
            </div>
          </div>
        </div>`;
      }

      // set it bsack to the gallery
      gallery.innerHTML = galleryContent;
    </script>
  </body>
</html>
